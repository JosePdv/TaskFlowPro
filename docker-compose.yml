services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      # O Docker mapeia 'host.docker.internal' para o IP do seu Ubuntu
      - DATABASE_URL=postgres://postgres:0125896320@host.docker.internal:5432/TaskFlowPro
      - ALLOWED_HOSTS=localhost,127.0.0.1,host.docker.internal
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules                   # Evita que o node_modules local sobrescreva o do container
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true            # Mantém o hot-reload funcionando no Linux
    stdin_open: true
    tty: true
